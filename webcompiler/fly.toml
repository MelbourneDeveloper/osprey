# fly.toml app configuration file for the Osprey web playground compiler.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# The app is named `osprey` — this is the host the website playground calls
# (https://osprey.fly.dev/api). The deploy workflow passes a matching
# `--app osprey`; keep this field in sync so a bare `fly deploy` targets the
# same machine the playground actually hits.

app = 'osprey'
primary_region = 'ord'

[build]
  dockerfile = "./Dockerfile"

[env]
  DOCKER_ENV = 'true'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 30
    soft_limit = 25

  [http_service.http_options]
    idle_timeout = 5

[[vm]]
  size = 'shared-cpu-2x'
  memory = '512mb'
