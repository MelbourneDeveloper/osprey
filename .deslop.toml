# Deslop duplication gate — [CI-DESLOP]
# Single source of truth for this repo's code-duplication budget. Committed,
# PR-reviewed, ratcheted DOWN only — never up without a written justification.
# CI runs `deslop .`, which reads this file and exits non-zero — FAILING THE
# BUILD — when measured duplication exceeds the ceiling below. Deslop parses
# Rust/C#/Python/Dart, so this gates the Rust workspace (the C runtime is out
# of scope here).
# Docs: https://deslop.live/docs/for-ai/
[threshold]
# Measured 10.56% (2026-06-11; 18.03% when the gate was introduced). Ceiling
# sits just above measured to absorb cross-runner float jitter. Ratchet DOWN as
# duplication is removed — worst offenders today are osprey-types/builtins.rs
# and codegen's expr.rs (see `deslop top-offenders`).
max_duplication_percent = 11.0

[defaults]
exclude = [
  "**/tests/**",
  # Vendored, generated tree-sitter grammar bindings — not hand-written.
  "tree-sitter-osprey/**",
]
