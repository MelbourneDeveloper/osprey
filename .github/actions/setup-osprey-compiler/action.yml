name: "Setup Osprey Compiler"
description: "Installs the Rust toolchain + clang/LLVM, builds the C runtime archives and the osprey binary"
inputs:
  rust-toolchain:
    description: "Rust toolchain to use"
    required: false
    default: "stable"
  version:
    description: "Version to stamp into the binary (OSPREY_VERSION); empty keeps the 0.0.0-dev placeholder"
    required: false
    default: ""

outputs:
  compiler-path:
    description: "Path to the built osprey binary"
    value: ${{ steps.build-compiler.outputs.compiler-path }}

runs:
  using: "composite"
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: rustfmt, clippy

    - name: Cache cargo registry + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-osprey-${{ hashFiles('Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-osprey-

    - name: Install clang/LLVM, lldb, OpenSSL and SQLite (Linux)
      if: runner.os == 'Linux'
      shell: bash
      # clang links the osprey-emitted IR; libssl-dev/libsqlite3-dev satisfy the
      # HTTP and FFI-database runtimes the examples link; zsh runs the
      # differential harness; lldb provides lldb-dap, which backs the VS Code
      # debugger end-to-end tests (osprey --debug -> lldb-dap).
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm lldb libssl-dev libsqlite3-dev pkg-config zsh
        clang --version
        # Expose lldb-dap at /usr/bin/lldb-dap — the package may ship it only under
        # a versioned LLVM bin dir — so the extension's PATH/`/usr/bin` resolver
        # finds it and the debugger E2E run (rather than failing as "not found").
        if ! command -v lldb-dap >/dev/null 2>&1; then
          DAP="$(ls /usr/lib/llvm-*/bin/lldb-dap /usr/bin/lldb-dap-* /usr/bin/lldb-vscode 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$DAP" ]; then sudo ln -sf "$DAP" /usr/bin/lldb-dap; fi
        fi
        command -v lldb-dap && echo "lldb-dap: $(command -v lldb-dap)" || echo "warning: lldb-dap unresolved"

    - name: Install LLVM and OpenSSL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm openssl@3 pkg-config
        echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
        echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

    - name: Build C runtime archives
      shell: bash
      run: make _runtime

    - name: Build osprey (release)
      id: build-compiler
      shell: bash
      env:
        OSPREY_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [ -z "${OSPREY_VERSION}" ]; then unset OSPREY_VERSION; fi
        cargo build --release -p osprey-cli
        echo "compiler-path=$GITHUB_WORKSPACE/target/release/osprey" >> "$GITHUB_OUTPUT"
        echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"
        target/release/osprey --version
