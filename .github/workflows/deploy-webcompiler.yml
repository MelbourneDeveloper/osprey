name: Deploy Web Compiler to Fly.io

on:
  # Deployed only as part of a tagged release (called by release.yml), or
  # manually. Merging to main does NOT deploy the web compiler.
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Web Compiler
    runs-on: ubuntu-latest
    concurrency: webcompiler-deploy-group

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # Optional add-on: a Fly outage or an invalid/banned FLY_API_TOKEN must
        # not fail a release. The browser compiler is not a release artifact.
        continue-on-error: true
        run: |
          flyctl deploy --remote-only --app osprey --config webcompiler/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
