# agent-pmo:74cf183
name: Deploy to GitHub Pages

on:
  # Deploy the live site whenever main is updated (e.g. a squash-merged PR),
  # in addition to release-driven deploys (workflow_call from release.yml)
  # and manual dispatch for emergency deploys.
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build Documentation and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: the Osprey compiler is intentionally NOT built here. The website
      # ships committed reference docs as the source of truth; generate-docs.sh
      # only regenerates them when an osprey binary that supports `--docs` is
      # present (it isn't yet), and otherwise exits cleanly. Building the Rust
      # compiler + LLVM here took 10+ min and blew the job timeout, which is why
      # the live site stopped updating. Re-add a compiler-setup step only once
      # `osprey --docs` lands and docs need regenerating at deploy time.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        working-directory: ./website
        run: npm ci

      - name: Build website (uses committed reference docs)
        working-directory: ./website
        run: npm run build

      # Gate the live deploy on the Playwright e2e suite — a broken or visually
      # regressed site never reaches production.
      - name: Install Playwright browser
        working-directory: ./website
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        working-directory: ./website
        run: npm test

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
