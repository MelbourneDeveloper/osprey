# agent-pmo:74cf183
name: Deploy to GitHub Pages

on:
  # Triggered by release.yml after a release is published (workflow_call).
  # Also supports manual dispatch for emergency deploys. NOT triggered by
  # pushes to main — only a tagged release deploys the site.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build Documentation and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Osprey Compiler
        uses: ./.github/actions/setup-osprey-compiler

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        working-directory: ./website
        run: npm ci

      - name: Generate documentation with Osprey compiler
        working-directory: ./website
        run: npm run generate-docs

      - name: Build website
        working-directory: ./website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
