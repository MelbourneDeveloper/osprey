# agent-pmo:74cf183
name: CI

# CI runs ONLY on PRs to main. Merging to main triggers nothing; releases are
# tag-triggered (release.yml). See docs/RELEASING.md.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # IMPORTANT: this name is the required status check on `main` (ruleset 6154907).
    # Renaming it will break branch protection — coordinate with the ruleset update.
    name: Test, Format, Build & Validate
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: full compiler build + C runtime compile + Go tests + Docker web compiler test requires ~15 min
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            vscode-extension/package-lock.json
            webcompiler/package-lock.json
            website/package-lock.json

      - name: Setup Osprey Compiler
        uses: ./.github/actions/setup-osprey-compiler

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: ./vscode-extension

      - name: Install jq, Xvfb and SQLite dev
        # libsqlite3-dev provides -lsqlite3 for the FFI database examples
        # (examples/tested/db, linked via the `// @link: sqlite3` directive).
        run: sudo apt-get install -y jq xvfb libsqlite3-dev

      # [SWR-VERSION-MANIFEST] keep shipwright.json valid against the in-repo
      # Shipwright schema. Do not use @nimblesite/shipwright-validate-manifest:
      # published versions currently ship without their bundled schemas.
      - name: Validate deployment manifest
        run: npm run test:shipwright
        working-directory: ./vscode-extension

      - name: Lint
        run: make lint

      # make test = fail-fast + per-project coverage + threshold enforcement.
      # Thresholds live in coverage-thresholds.json ([COVERAGE-THRESHOLDS-JSON]).
      # Xvfb is needed because vscode-extension tests spawn a real VS Code Electron build.
      - name: Test
        run: xvfb-run -a make test

      - name: Upload test logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: |
            compiler/test.log
            vscode-extension/test.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            compiler/coverage.out
            vscode-extension/coverage/
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            compiler/bin/
            vscode-extension/out/
          retention-days: 7

      - name: Test example compilation and execution
        working-directory: ./compiler
        run: |
          ./bin/osprey examples/tested/basics/math/comprehensive_math.osp --run
          ./bin/osprey examples/tested/basics/feature_omnibus.osp --run

      - name: Test Web Compiler
        run: |
          cd webcompiler
          docker build -t osprey-web-compiler-ci -f Dockerfile ..
          docker run -d --name osprey-web-compiler-ci -p 3001:3001 \
            -e NODE_ENV=production -e PORT=3001 \
            --memory=256m --memory-reservation=256m \
            osprey-web-compiler-ci
          sleep 15
          chmod +x test.sh && ./test.sh
          docker stop osprey-web-compiler-ci
          docker rm osprey-web-compiler-ci

  # ─── Rust compiler (osprey-rs) — the Phase-2 port's CI gate ──────────────────
  # Runs the SAME gate the Go→Rust migration is held to locally: format + clippy
  # (-D warnings: clippy::all + pedantic + restriction) + workspace tests + the
  # differential harness — every examples/tested case run through `osprey-rs
  # --run` must match its `.expectedoutput` byte-for-byte (whole-string trim),
  # the same behavioural contract the Go `ci` job enforces. The Go compiler is
  # still the released artifact (release.yml), so this runs ALONGSIDE `ci`, it
  # does not replace it.
  rust:
    name: Rust Compiler (fmt, clippy, test, differential)
    # ubuntu-latest is the most powerful GitHub-hosted runner available to this
    # public repo by default (4 vCPU / 16 GB). If a larger hosted runner is ever
    # provisioned for the account, switch this one label (e.g. to
    # ubuntu-latest-8-cores) — nothing else needs to change.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-

      - name: Install clang/LLVM, OpenSSL, SQLite and zsh
        # clang links the osprey-rs-emitted IR; libssl-dev/libsqlite3-dev satisfy
        # the HTTP and FFI-database runtimes the examples link; zsh runs the
        # differential harness.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libssl-dev libsqlite3-dev pkg-config zsh
          clang --version

      - name: Build the C runtime archives (pure C — osprey-rs links these)
        # fiber-runtime + http-runtime emit compiler/bin/lib*_runtime.a, which
        # osprey-rs links at `--run` time. These targets are plain C ($(CC)/$(AR)),
        # so no Go toolchain is needed here.
        working-directory: ./compiler
        run: make fiber-runtime http-runtime

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all targets, warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Differential golden tests (osprey-rs --run vs .expectedoutput)
        # Must be 41/41 with zero examples lacking an expected output, and the
        # must-reject suite (examples/failscompilation) must stay within the
        # FC_EXPECTED_ESCAPES ratchet declared in the harness.
        run: |
          out=$(zsh crates/diff_examples.sh)
          echo "$out"
          echo "$out" | grep -Eq 'FAIL=0 '  || { echo '::error::differential test FAILures'; exit 1; }
          echo "$out" | grep -Eq 'NOEXP=0 ' || { echo '::error::an example has no .expectedoutput'; exit 1; }
          echo "$out" | grep -q  'FC_OK'    || { echo '::error::must-reject ratchet exceeded (ill-formed programs accepted)'; exit 1; }
