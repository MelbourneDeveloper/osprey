# agent-pmo:74cf183
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: full compiler build + C runtime compile + Go tests + Docker web compiler test requires ~15 min
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            vscode-extension/package-lock.json
            webcompiler/package-lock.json
            website/package-lock.json

      - name: Setup Osprey Compiler
        uses: ./.github/actions/setup-osprey-compiler

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: ./vscode-extension

      - name: Install jq and Xvfb
        run: sudo apt-get install -y jq xvfb

      - name: Lint
        run: make lint

      # make test = fail-fast + per-project coverage + threshold enforcement.
      # Thresholds live in coverage-thresholds.json ([COVERAGE-THRESHOLDS-JSON]).
      # Xvfb is needed because vscode-extension tests spawn a real VS Code Electron build.
      - name: Test
        run: xvfb-run -a make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            compiler/coverage.out
            vscode-extension/coverage/
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            compiler/bin/
            vscode-extension/out/
          retention-days: 7

      - name: Test example compilation and execution
        working-directory: ./compiler
        run: |
          ./bin/osprey examples/tested/basics/math/interpolation_math.osp --run
          ./bin/osprey examples/tested/basics/comprehensive.osp --run

      - name: Test Web Compiler
        run: |
          cd webcompiler
          docker build -t osprey-web-compiler-ci -f Dockerfile ..
          docker run -d --name osprey-web-compiler-ci -p 3001:3001 \
            -e NODE_ENV=production -e PORT=3001 \
            --memory=256m --memory-reservation=256m \
            osprey-web-compiler-ci
          sleep 15
          chmod +x test.sh && ./test.sh
          docker stop osprey-web-compiler-ci
          docker rm osprey-web-compiler-ci
